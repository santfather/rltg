id: "level_07"
title: "Миссия 7: Машинное отделение"
location: "Машинное отделение — Engine Room"

ascii_art_path: "level_07.svg"

ascii_art: |
  ╔══════════════════════════════════════╗
  ║   ENGINE ROOM — CRITICAL O₂         ║
  ║   legacy_lockd: ZOMBIE PROCESS      ║
  ║   O2: ██░░░░░░░░░░ 28%              ║
