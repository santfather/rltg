id: "level_05"
title: "Миссия 5: Турельный пост"
location: "Турельный пост — Сектор C"

ascii_art_path: "level_05.svg"

ascii_art: |
  ╔══════════════════════════════════════╗
  ║   TURRET CONTROL — SECTOR C         ║
